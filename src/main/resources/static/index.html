<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punjab Route Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"><span></span><span></span><span></span><span></span><span></span></div>

<div class="page">

    <div class="header">
        <div class="badge">Punjab, India</div>
        <h1>Shortest <span>Route</span> Finder</h1>
        <p>Find the best road route between cities of Indian Punjab</p>
    </div>

    <div class="card">
        <div class="field-group">
            <div class="field-label">
                <div class="circle-icon from">A</div>
                <span class="lbl">From City</span>
            </div>
            <select id="city1"><option value="">Select Starting City</option></select>
        </div>

        <div class="connector">
            <button class="swap-btn" onclick="swapCities()">Swap</button>
        </div>

        <div class="field-group">
            <div class="field-label">
                <div class="circle-icon to">B</div>
                <span class="lbl">To City</span>
            </div>
            <select id="city2"><option value="">Select Destination City</option></select>
        </div>

        <button class="calc-btn" onclick="findRoute()">Find Shortest Route</button>
        <p class="error-msg" id="errMsg">Please select two different cities.</p>

        <div class="result-box" id="resultBox">
            <div class="summary-circles" id="summaryCols"></div>
            <div class="route-title">Route Breakdown</div>
            <div class="timeline" id="timeline"></div>
            <div class="route-title roads-title">Through Roads</div>
            <div class="roads-list" id="roadsList"></div>
            <div class="route-title map-title">Map View</div>
            <div class="map-panel">
                <div id="routeMap"></div>
                <p class="map-status" id="mapStatus">Select two cities to draw the route on the map.</p>
            </div>
        </div>
    </div>

    <div class="cities-section">
        <h3>Available Cities</h3>
        <div class="chips" id="chips"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script src="app.js"></script>
</body>
</html>
